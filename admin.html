<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">Premium Store</a>
            <div class="nav-links">
                <a href="index.html">View Site</a>
                <a href="#" id="logoutBtn" class="hidden">Logout</a>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Login Section -->
        <div id="loginSection" class="login-box hidden">
            <h2 class="login-title">Admin Login</h2>
            <div id="loginAlert" class="alert alert-error hidden">Invalid Username or Password</div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn">Secure Login</button>
            </form>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboardSection" class="hidden">

            <div class="admin-container">
                <div class="admin-header">
                    <h2>WhatsApp Settings</h2>
                </div>
                <form id="settingsForm">
                    <div class="form-group">
                        <label>Order WhatsApp Number (Include Country Code, e.g. 94770000000)</label>
                        <input type="text" id="whatsappNumber" class="form-control" required>
                    </div>
                    <button type="submit" class="btn" style="width: auto;">Save Number</button>
                </form>
            </div>

            <div class="admin-container">
                <div class="admin-header">
                    <h2>Add New Product</h2>
                </div>

                <form id="productForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Product Name</label>
                            <input type="text" id="productName" class="form-control" placeholder="e.g. Leather Bag"
                                required>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <input type="text" id="productCategory" class="form-control" placeholder="e.g. Fashion"
                                required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Price (LKR)</label>
                            <input type="number" id="productPrice" class="form-control" placeholder="e.g. 4500"
                                required>
                        </div>
                        <div class="form-group">
                            <label>Product Images</label>
                            <div class="image-upload-area" id="imageUploadArea">
                                <p class="upload-text">Drag & Drop images here, Paste, or <span
                                        style="color:var(--primary); font-weight:600;">Browse</span></p>
                                <input type="file" id="productImageFile" accept="image/*" class="hidden" multiple>
                                <input type="text" id="productImage" class="form-control"
                                    placeholder="...or enter an Image URL here and press Enter">
                                <div id="imagePreviewContainer"
                                    style="display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-top: 1rem; width: 100%;">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Short Description (Optional)</label>
                        <textarea id="productDescription" class="form-control" rows="3"
                            placeholder="Describe the key features..."></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: auto;">Add Product to Store</button>
                </form>
            </div>

            <div class="admin-container">
                <div class="admin-header">
                    <h2>Manage Inventory</h2>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 80px;">Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th style="width: 100px;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="adminProductTable">
                            <!-- Products loaded by script -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
